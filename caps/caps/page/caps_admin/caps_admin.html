<div class="caps-admin-page">
	<div id="caps-kpi-dashboard" style="margin-bottom:20px;"></div>

	<div class="caps-graph-section" style="margin-bottom:20px;">
		<div class="d-flex justify-content-between align-items-center" style="margin-bottom:8px;">
			<h5 style="margin:0;" class="caps-module-map-title">CAPS Module Map</h5>
			<div>
				<button class="btn btn-xs btn-default" id="btn-caps-onboarding">Onboarding</button>
				<button class="btn btn-xs btn-default" id="btn-caps-help">❓</button>
			</div>
		</div>
		<div id="caps-module-graph" style="width:100%;height:380px;border:1px solid var(--border-color);border-radius:8px;overflow:hidden;"></div>
	</div>

	<div class="row">
		<div class="col-md-6">
			<div class="caps-panel">
				<h5 class="caps-user-lookup-title">User Capability Lookup</h5>
				<div id="user-lookup-field" style="margin-bottom:12px;"></div>
				<div id="user-capabilities-result"></div>
			</div>

			<div class="caps-panel" style="margin-top:16px;">
				<h5 class="caps-quick-actions-title">Quick Actions</h5>
				<div class="caps-quick-actions">
					<button class="btn btn-sm btn-default" id="btn-export-config">
						<span data-fv-icon="download" data-fv-size="sm"></span> Export Config
					</button>
					<button class="btn btn-sm btn-default" id="btn-import-config">
						<span data-fv-icon="upload" data-fv-size="sm"></span> Import Config
					</button>
					<button class="btn btn-sm btn-default" id="btn-bust-cache">
						<span data-fv-icon="refresh" data-fv-size="sm"></span> Bust All Caches
					</button>
					<button class="btn btn-sm btn-default" id="btn-new-capability">
						<span data-fv-icon="plus" data-fv-size="sm"></span> New Capability
					</button>
				</div>
			</div>
		</div>

		<div class="col-md-6">
			<div class="caps-panel">
				<h5 class="caps-policies-title">Active Policies</h5>
				<div id="active-policies-list">
					<div class="text-muted">Loading...</div>
				</div>
			</div>

			<div class="caps-panel" style="margin-top:16px;">
				<h5 class="caps-audit-title">Recent Audit Log</h5>
				<div id="recent-audit-log">
					<div class="text-muted">Loading...</div>
				</div>
			</div>

			<div class="caps-panel" style="margin-top:16px;">
				<h5 class="caps-expiring-title">Expiring Soon</h5>
				<div id="expiring-capabilities">
					<div class="text-muted">Loading...</div>
				</div>
			</div>
		</div>
	</div>
</div>
